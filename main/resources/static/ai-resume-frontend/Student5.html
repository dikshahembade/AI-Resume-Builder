<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Resume Builder - Elegant Template (With Photo)</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Resume container */
    #resumeContent {
      width: 794px;
      min-height: 1123px;
      background: white;
      margin: 0 auto;
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      border-radius: 10px;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue",
        Arial;
      color: #1f2937;
    }

    /* Hide non-print controls */
    @media print {
      body * {
        visibility: hidden;
      }
      #resumeContent,
      #resumeContent * {
        visibility: visible;
      }
      #resumeContent {
        position: absolute;
        left: 0;
        top: 0;
      }
      .no-print {
        display: none !important;
      }
    }

    /* Make the converted PDF divs behave like textareas */
    .pdf-text {
      width: 100%;
      box-sizing: border-box;
      white-space: pre-wrap; /* preserve newlines and wrap text */
      word-break: break-word;
      overflow-wrap: break-word;
    }

    /* Remove native textarea resize handle in UI, we'll auto-resize programmatically */
    textarea {
      resize: none;
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 flex flex-col items-center py-10 font-sans">

  <!-- TOP NAV BAR -->
  <div class="w-full flex justify-between items-center px-10 mb-8 no-print">
    <h1 class="text-2xl font-bold text-white">AI <span class="text-indigo-400">Resume Builder</span></h1>
    <div class="space-x-4">
      <a href="home.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition duration-300">Home</a>
      <a href="Template.html" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-semibold transition duration-300">Choose Template</a>
    </div>
  </div>

  <!-- MAIN RESUME -->
  <div id="resumeContent" class="shadow-2xl overflow-hidden">

    <!-- LEFT MAIN CONTENT -->
    <div class="w-2/3 p-10 space-y-6">

      <!-- HEADER WITH PHOTO -->
      <div class="flex items-center justify-between mb-6">
        <div class="flex-1 text-center pr-4">
          <input id="name" type="text" placeholder="YOUR NAME"
                 class="text-3xl font-bold text-gray-800 uppercase outline-none w-full text-center">
        </div>

        <div class="w-28 h-28 border-4 border-teal-700 rounded-full overflow-hidden bg-gray-100 flex items-center justify-center relative">
          <label id="uploadLabel"
                 class="cursor-pointer text-gray-500 text-sm text-center absolute inset-0 flex flex-col items-center justify-center bg-white bg-opacity-70 hover:bg-opacity-90 transition no-print">
            <span>Upload<br>Photo</span>
            <input id="photoUpload" type="file" accept="image/*" class="hidden" onchange="previewPhoto(event)">
          </label>
          <img id="profilePhoto" class="hidden w-full h-full object-cover absolute inset-0"/>
        </div>
      </div>

      <!-- SUMMARY -->
      <section>
        <div class="flex justify-between items-center">
          <h2 class="text-lg font-bold text-teal-700 uppercase border-b-2 border-teal-700 mb-2 w-full">Professional Summary</h2>
          <button onclick="generateSummaryAI()" class="no-print bg-purple-600 hover:bg-purple-700 text-white px-2 py-1 rounded text-xs ml-2">AI</button>
        </div>
        <textarea id="summary" placeholder="Write a short summary..."
                  class="w-full border border-gray-400 rounded-md p-2 h-16"></textarea>
        
      </section>

    

      <!-- PROJECTS -->
      <section>
        <div class="flex justify-between items-center">
          <h2 class="text-lg font-bold text-teal-700 uppercase border-b-2 border-teal-700 mb-2 w-full">Projects</h2>
          <button onclick="generateProjectsAI()" class="no-print bg-purple-600 hover:bg-purple-700 text-white px-2 py-1 rounded text-xs ml-2">AI</button>
        </div>
        <textarea id="projects" placeholder="Describe your projects..."
                  class="w-full border border-gray-400 rounded-md p-2 h-32"></textarea>
      </section>

      <!-- EDUCATION -->
      <section>
        <h2 class="text-lg font-bold text-teal-700 uppercase border-b-2 border-teal-700 mb-2">Education</h2>
        <div class="space-y-2">
          <input id="degree" type="text" placeholder="Degree (e.g., B.Tech in CSE)" class="border-b border-gray-400 outline-none w-full p-1">
          <input id="institute" type="text" placeholder="Institute Name" class="italic border-b border-gray-300 outline-none w-full p-1">
          <input id="graduationYear" type="text" placeholder="Graduation Year" class="border-b border-gray-300 outline-none w-full p-1">
        </div>
      </section>

      <!-- CERTIFICATES -->
      <section>
        <h2 class="text-lg font-bold text-teal-700 uppercase border-b-2 border-teal-700 mb-2">Certificates</h2>
        <textarea id="certificates" placeholder="List certifications..."
                  class="w-full border border-gray-400 rounded-md p-2 h-14"></textarea>
      </section>
    </div>

    <!-- RIGHT SIDEBAR -->
    <aside class="w-1/3 bg-teal-700 text-white p-8 flex flex-col justify-start">

      <!-- CONTACT -->
       <section>
        <h2 class="text-lg font-semibold border-b border-white pb-1 mb-3 uppercase">Contact</h2>
        <input id="phone" type="text" placeholder="Phone Number" class="bg-transparent border-b border-white outline-none w-full mb-2">
        <input id="email" type="email" placeholder="Email" class="bg-transparent border-b border-white outline-none w-full mb-2">
        <input id="linkedin" type="text" placeholder="LinkedIn" class="bg-transparent border-b border-white outline-none w-full mb-2">
        <input id="address" type="text" placeholder="Address" class="bg-transparent border-b border-white outline-none w-full">
      </section>

      <!-- SKILLS -->
      <section class="mt-4">
        <div class="flex justify-between items-center">
          <h2 class="text-lg font-semibold border-b border-white pb-1 mb-3 uppercase w-full">Skills</h2>
          <button onclick="generateSkillsAI()" class="no-print bg-purple-600 hover:bg-purple-700 text-white px-2 py-1 rounded text-xs ml-2">AI</button>
        </div>
        <textarea id="skills" placeholder="Java, HTML, CSS..."
                  class="bg-transparent border border-white rounded-md p-2 w-full h-32"></textarea>
      </section>

    </aside>
  </div>

  <!-- DOWNLOAD BUTTON -->
  <div class="fixed bottom-5 left-1/2 transform -translate-x-1/2 no-print">
    <button onclick="generatePDF()" 
      class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-lg font-semibold transition duration-300">
      Download Resume (PDF)
    </button>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
/* ---------------------------
   PHOTO UPLOAD (BASE64)
   --------------------------- */
let profileBase64 = null;

function previewPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    profileBase64 = e.target.result;

    const img = document.getElementById("profilePhoto");
    img.src = profileBase64;
    img.classList.remove("hidden");

    document.getElementById("uploadLabel").style.display = "none";
  };
  reader.readAsDataURL(file);
}

/* ---------------------------
   AI BACKEND CALL (same hook)
   --------------------------- */
async function callAI(type) {
  const name = document.getElementById("name").value || "Candidate";
  const degree = document.getElementById("degree").value || "";
  const skills = document.getElementById("skills").value || "";

  const body = { type, name, degree, skills };

  try {
    const res = await fetch("http://localhost:8080/api/ai/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });

    return await res.text();
  } catch (err) {
    alert("AI Backend not running!");
    return "";
  }
}

async function generateSummaryAI() {
  const el = document.getElementById("summary");
  el.value = "Generating using AI...";
  el.value = await callAI("summary");
  autoResize(el);
}

async function generateSkillsAI() {
  const el = document.getElementById("skills");
  el.value = "Generating using AI...";
  el.value = await callAI("skills");
  autoResize(el);
}

async function generateProjectsAI() {
  const el = document.getElementById("projects");
  el.value = "Generating using AI...";
  el.value = await callAI("projects");
  autoResize(el);
}

/* ---------------------------
   SAVE TO BACKEND
   --------------------------- */
async function saveResumeToBackend() {

  const resumeData = {
    name: document.getElementById('name').value,               // fullName → name
    phone: document.getElementById('phone').value,
    email: document.getElementById('email').value,
    address: document.getElementById('address').value,

    linkedin: document.getElementById('linkedin').value,       // linkedIn

    summary: document.getElementById('summary').value,         // professionalSummary

    skills: document.getElementById('skills').value,

    

    projects: document.getElementById('projects').value,

    degree: document.getElementById('degree').value,
    institute: document.getElementById('institute').value,
    graduationYear: document.getElementById('graduationYear').value,

    coursework: "",                       // REQUIRED by backend (send empty if not used)

    certificateTitle: document.getElementById('certificates').value, // FIXED

    profileImage: profileBase64           // FIXED (backend expects profileImage)
  };

  try {
    await fetch("http://localhost:8080/api/resumes", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(resumeData)
    });
  } catch (err) {
    console.warn("Backend save failed:", err);
  }

}


/* ---------------------------
   AUTO-RESIZE TEXTAREAS (Option B)
   --------------------------- */
function autoResize(el) {
  // reset height to compute new scrollHeight correctly
  el.style.height = 'auto';
  // set to scrollHeight (plus a small extra for padding safety)
  el.style.height = (el.scrollHeight) + 'px';
}

// Attach to all existing textareas
function attachAutoResize() {
  document.querySelectorAll('textarea').forEach((ta) => {
    autoResize(ta); // adjust if it already has content
    ta.addEventListener('input', () => autoResize(ta));
  });
}

// Run on load
document.addEventListener('DOMContentLoaded', attachAutoResize);

/* ---------------------------
   PDF GENERATION (improved)
   - Clones the resume DOM
   - Replaces <textarea> with <div class="pdf-text"> preserving content, fonts and spacing
   - Ensures images and base64 profile photo are included
   --------------------------- */
async function generatePDF() {
  // Save first (non-blocking if backend not available)
  await saveResumeToBackend();

  const element = document.getElementById("resumeContent");

  const opt = {
    margin: 0,
    filename: "My_Resume.pdf",
    image: { type: "jpeg", quality: 1 },
    html2canvas: {
      scale: 3,                 // HIGH RESOLUTION
      scrollY: 0,
      useCORS: true,
      allowTaint: true,
      imageTimeout: 0,
      ignoreElements: (el) => el.classList && el.classList.contains("no-print"),
      onclone: (clonedDoc) => {
        // Replace all textareas in clonedDoc with divs so the full content is visible and wrapped
        const taList = clonedDoc.querySelectorAll('textarea');

        taList.forEach((ta) => {
          const div = clonedDoc.createElement('div');

          // copy basic computed styles to preserve look
          const computed = clonedDoc.defaultView.getComputedStyle(ta);
          const style = div.style;

          // Copy typography & box model that matter
          style.fontFamily = computed.fontFamily;
          style.fontSize = computed.fontSize;
          style.fontWeight = computed.fontWeight;
          style.letterSpacing = computed.letterSpacing;
          style.lineHeight = computed.lineHeight;
          style.padding = computed.padding;
          style.margin = computed.margin;
          style.border = 'none'; // borders are part of layout, handled by surrounding elements
          style.boxSizing = computed.boxSizing;
          style.width = computed.width;
          style.minHeight = ta.scrollHeight + 'px';

          // Additional PDF helper class
          div.className = 'pdf-text';

          // Transfer text preserving newlines
          div.innerText = ta.value || '';

          // Replace in DOM
          ta.parentNode.replaceChild(div, ta);
        });

        // Make sure profile image (if base64) is visible in cloned doc
        const avatar = clonedDoc.getElementById('profilePhoto');
        if (avatar && avatar.src && avatar.src.startsWith('data:')) {
          avatar.classList.remove('hidden');
        }
      }
    },

    jsPDF: {
      unit: "px",
      format: [794, 1123], // preserve exact px size corresponding to the layout
      orientation: "portrait",
      compress: false
    }
  };

  // Run html2pdf
  try {
    await html2pdf().set(opt).from(element).save();
  } catch (err) {
    console.error("PDF generation failed:", err);
    alert("PDF generation failed. Open console for details.");
  }
}

</script>

</body>
</html>
