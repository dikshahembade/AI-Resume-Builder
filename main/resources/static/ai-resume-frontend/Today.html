<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Resume Builder - Template (With Photo Added)</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    #resumeContent {
      width: 794px;
      min-height: 1123px;
      background: white;
      margin: 0 auto;
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      border-radius: 10px;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      color: #1f2937;
    }
    @media print {
      body * { visibility: hidden; }
      #resumeContent, #resumeContent * { visibility: visible; }
      #resumeContent { position: absolute; left: 0; top: 0; }
      .no-print { display: none !important; }
    }
    .pdf-text {
      white-space: pre-wrap;
      word-break: break-word;
    }
    textarea { resize: none; }
  </style>
</head>

<body class="min-h-screen bg-gray-900 flex flex-col items-center py-10">

  <!-- TOP NAV BAR -->
  <div class="w-full flex justify-between items-center px-10 mb-8 no-print">
    <h1 class="text-2xl font-bold text-white">AI <span class="text-indigo-400">Resume Builder</span></h1>
    <div class="space-x-4">
      <a href="home.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold">Home</a>
      <a href="Template.html" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-semibold">Choose Template</a>
    </div>
  </div>

  <!-- RESUME -->
  <div id="resumeContent" class="shadow-2xl overflow-hidden flex">

    <!-- LEFT PANEL -->
    <div class="w-2/3 p-10 space-y-6">

      <!-- HEADER + PHOTO ADDED HERE -->
      <div class="flex items-center justify-between mb-4">

        <div class="flex-1 text-center pr-4">
          <input id="name" type="text" placeholder="YOUR NAME"
            class="text-3xl font-bold text-gray-800 uppercase outline-none w-full text-center">
        </div>

        <!-- PHOTO UPLOAD OPTION ADDED -->
        <div class="w-28 h-28 border-4 border-teal-700 rounded-full overflow-hidden bg-gray-100 flex items-center justify-center relative">
          <label id="uploadLabel"
            class="cursor-pointer text-gray-500 text-sm text-center absolute inset-0 flex flex-col items-center justify-center bg-white bg-opacity-80 hover:bg-opacity-90 transition no-print">
            <span>Upload<br>Photo</span>
            <input id="photoUpload" type="file" accept="image/*" class="hidden" onchange="previewPhoto(event)">
          </label>
          <img id="profilePhoto" class="hidden w-full h-full object-cover absolute inset-0"/>
        </div>

      </div>

      <!-- SUMMARY -->
      <section>
        <div class="flex justify-between items-center">
          <h2 class="text-lg font-bold text-teal-700 uppercase border-b-2 border-teal-700 w-full">Professional Summary</h2>
          <button onclick="generateSummaryAI()" class="no-print bg-purple-600 text-white px-2 py-1 rounded text-xs ml-2">AI</button>
        </div>
        <textarea id="summary" class="w-full border border-gray-400 rounded-md p-2 h-16" placeholder="Write a short summary..."></textarea>
      </section>

      <!-- EXPERIENCE -->
      <section>
        <h2 class="text-lg font-bold text-teal-700 uppercase border-b-2 border-teal-700 mb-2">Experience</h2>
        <input id="jobTitle" class="border-b border-gray-400 p-1 outline-none w-full mb-1" placeholder="Job Title">
        <input id="company" class="border-b border-gray-300 p-1 italic outline-none w-full mb-1" placeholder="Company Name, City">
        <input id="duration" class="border-b border-gray-300 p-1 outline-none w-full" placeholder="Duration (e.g., 2023 - Present)">
      </section>

      <!-- PROJECTS -->
      <section>
        <div class="flex justify-between items-center">
          <h2 class="text-lg font-bold text-teal-700 uppercase border-b-2 border-teal-700 w-full">Projects</h2>
          <button onclick="generateProjectsAI()" class="no-print bg-purple-600 text-white px-2 py-1 rounded text-xs ml-2">AI</button>
        </div>
        <textarea id="projects" class="w-full border border-gray-400 rounded-md p-2 h-32"></textarea>
      </section>

      <!-- EDUCATION -->
      <section>
        <h2 class="text-lg font-bold text-teal-700 uppercase border-b-2 border-teal-700 mb-2">Education</h2>
        <input id="degree" class="border-b border-gray-400 p-1 outline-none w-full mb-1" placeholder="Degree">
        <input id="institute" class="border-b border-gray-300 p-1 italic outline-none w-full mb-1" placeholder="Institute Name">
        <input id="graduationYear" class="border-b border-gray-300 p-1 outline-none w-full" placeholder="Graduation Year">
      </section>

      <!-- CERTIFICATES -->
      <section>
        <h2 class="text-lg font-bold text-teal-700 uppercase border-b-2 border-teal-700 mb-2">Certificates</h2>
        <textarea id="certificates" class="w-full border border-gray-400 rounded-md p-2 h-14"></textarea>
      </section>

    </div>

    <!-- RIGHT SIDEBAR -->
    <aside class="w-1/3 bg-teal-700 text-white p-8">

      <section>
        <h2 class="text-lg font-semibold border-b border-white pb-1 mb-3 uppercase">Contact</h2>
        <input id="phone" class="bg-transparent border-b border-white w-full mb-2 outline-none" placeholder="Phone Number">
        <input id="email" class="bg-transparent border-b border-white w-full mb-2 outline-none" placeholder="Email">
        <input id="linkedin" class="bg-transparent border-b border-white w-full mb-2 outline-none" placeholder="LinkedIn">
        <input id="address" class="bg-transparent border-b border-white w-full outline-none" placeholder="Address">
      </section>

      <section class="mt-5">
        <div class="flex justify-between">
          <h2 class="text-lg font-semibold border-b border-white pb-1 mb-3 uppercase w-full">Skills</h2>
          <button onclick="generateSkillsAI()" class="no-print bg-purple-600 text-white px-2 py-1 rounded text-xs ml-2">AI</button>
        </div>
        <textarea id="skills" class="w-full bg-transparent border border-white rounded-md p-2 h-32"></textarea>
      </section>

    </aside>
  </div>

  <!-- DOWNLOAD BUTTON -->
  <div class="fixed bottom-5 left-1/2 -translate-x-1/2 no-print">
    <button onclick="generatePDF()" class="bg-indigo-600 text-white px-8 py-3 rounded-lg">Download Resume (PDF)</button>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
/* ----------------------- PHOTO UPLOAD --------------------------- */
let profileBase64 = null;

function previewPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    profileBase64 = e.target.result;
    document.getElementById("profilePhoto").src = profileBase64;
    document.getElementById("profilePhoto").classList.remove("hidden");
    document.getElementById("uploadLabel").style.display = "none";
  };
  reader.readAsDataURL(file);
}

/* ---------------- AI (unchanged) ---------------- */
async function callAI(type) {
  const name = name.value;
  const degree = degree.value;
  const skills = skills.value;

  try {
    const res = await fetch("http://localhost:8080/api/ai/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type, name, degree, skills })
    });
    return await res.text();
  } catch {
    alert("AI backend not running");
    return "";
  }
}
async function generateSummaryAI() { summary.value = await callAI("summary"); }
async function generateProjectsAI() { projects.value = await callAI("projects"); }
async function generateSkillsAI() { skills.value = await callAI("skills"); }

/* ---------------- SAVE TO BACKEND WITH PHOTO ---------------- */
async function saveResumeToBackend() {
  const data = {
    name: name.value,
    phone: phone.value,
    email: email.value,
    address: address.value,
    linkedin: linkedin.value,
    summary: summary.value,
    skills: skills.value,
    jobTitle: jobTitle.value,
    company: company.value,
    duration: duration.value,
    projects: projects.value,
    degree: degree.value,
    institute: institute.value,
    graduationYear: graduationYear.value,
    certificateTitle: certificates.value,
    coursework: "",
    profileImage: profileBase64   // photo saved
  };

  await fetch("http://localhost:8080/api/resumes", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
}

/* ---------------- PDF ---------------- */
async function generatePDF() {
  await saveResumeToBackend();
  html2pdf().set({
    margin: 0,
    filename: "My_Resume.pdf",
    html2canvas: { scale: 3 },
    jsPDF: { unit: "px", format: [794, 1123], orientation: "portrait" }
  }).from(document.getElementById("resumeContent")).save();
}
</script>

</body>
</html>
